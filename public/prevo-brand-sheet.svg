  <text x="124" y="564" font-family="-apple-system,'SF Pro Display','Helvetica Neue',sans-serif" font-size="42" font-weight="500" letter-spacing="-1.5" fill="#09090B">prevo</text>
  <rect x="125" y="573" width="14" height="1" fill="#3B82F6" opacity="0.55"/>
  <text x="144" y="582" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="8" font-weight="300" letter-spacing="3.5" fill="#A1A1AA">FISCAL CLARITY</text>

