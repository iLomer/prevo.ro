  <text x="320" y="506" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="8" letter-spacing="2.5" fill="#A1A1AA">ALT ICON — SLASH</text>

  <rect x="320" y="518" width="68" height="68" rx="17" fill="#F4F4F5"/>
