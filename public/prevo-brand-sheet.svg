  <rect x="380" y="768" width="48" height="48" rx="10" fill="url(#swatchGrad)"/>
  <text x="380" y="832" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="8" fill="#71717A">GRADIENT</text>

