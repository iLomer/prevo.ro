  <rect x="407" y="573" width="14" height="1" fill="#3B82F6" opacity="0.55"/>
  <text x="426" y="582" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="8" font-weight="300" letter-spacing="3.5" fill="#A1A1AA">FISCAL CLARITY</text>

