<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <!-- Gradient A: teal → blue (original) -->
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- Gradient B: violet → cyan (alt) -->
    <linearGradient id="gradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <!-- Gradient C: amber → orange (warm) -->
    <linearGradient id="gradC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <!-- Glow dark -->
    <radialGradient id="glowDark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow light -->
    <radialGradient id="glowLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6EE7B7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ================================================ -->
  <!-- SECTION LABEL: DARK VARIANTS                     -->
  <!-- ================================================ -->
  <rect width="800" height="1000" fill="#F4F4F5"/>

