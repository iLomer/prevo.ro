  <rect x="320" y="82" width="68" height="68" rx="17" fill="none" stroke="#222226" stroke-width="1.2"/>
  <ellipse cx="354" cy="116" rx="40" ry="34" fill="url(#glowDark)" opacity="0.8"/>
