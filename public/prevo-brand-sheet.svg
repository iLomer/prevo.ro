  <rect x="0" y="0" width="800" height="440" fill="#09090B"/>
  <!-- Section label -->
  <text x="40" y="38" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="10" font-weight="500" letter-spacing="3.5" fill="#3F3F46">DARK</text>

  <!-- ============ DARK / FULL COLOR (primary) ============ -->
  <text x="40" y="70" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="8" letter-spacing="2.5" fill="#3F3F46">PRIMARY</text>

  <!-- Icon -->
  <rect x="40" y="82" width="68" height="68" rx="17" fill="#111113"/>
  <rect x="40" y="82" width="68" height="68" rx="17" fill="none" stroke="#222226" stroke-width="1.2"/>
  <ellipse cx="74" cy="116" rx="44" ry="34" fill="url(#glowDark)" opacity="0.8"/>
  <path d="M 58 101 L 74 116 L 58 131" fill="none" stroke="url(#gradA)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 70 101 L 86 116 L 70 131" fill="none" stroke="url(#gradA)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="124" y="128" font-family="-apple-system,'SF Pro Display','Helvetica Neue',sans-serif" font-size="42" font-weight="500" letter-spacing="-1.5" fill="#FAFAFA">prevo</text>
  <rect x="125" y="137" width="14" height="1" fill="#3B82F6" opacity="0.55"/>
  <text x="144" y="146" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="8" font-weight="300" letter-spacing="3.5" fill="#52525B">FISCAL CLARITY</text>

