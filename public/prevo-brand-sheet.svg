  <rect x="40" y="768" width="48" height="48" rx="10" fill="#09090B"/>
  <text x="40" y="832" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="8" fill="#71717A">#09090B</text>

  <rect x="108" y="768" width="48" height="48" rx="10" fill="#FAFAFA"/>
  <rect x="108" y="768" width="48" height="48" rx="10" fill="none" stroke="#E4E4E7" stroke-width="1"/>
  <text x="108" y="832" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="8" fill="#71717A">#FAFAFA</text>

  <rect x="176" y="768" width="48" height="48" rx="10" fill="#6EE7B7"/>
  <text x="176" y="832" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="8" fill="#71717A">#6EE7B7</text>

  <rect x="244" y="768" width="48" height="48" rx="10" fill="#3B82F6"/>
  <text x="244" y="832" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="8" fill="#71717A">#3B82F6</text>

