  <rect x="40" y="642" width="68" height="68" rx="17" fill="#F0F0F1"/>
  <rect x="40" y="642" width="68" height="68" rx="17" fill="none" stroke="#E4E4E7" stroke-width="1.2"/>
  <path d="M 58 661 L 74 676 L 58 691" fill="none" stroke="#09090B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 70 661 L 86 676 L 70 691" fill="none" stroke="#09090B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <text x="124" y="688" font-family="-apple-system,'SF Pro Display','Helvetica Neue',sans-serif" font-size="42" font-weight="500" letter-spacing="-1.5" fill="#09090B">prevo</text>

